name: Build and deploy BTC report

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0,15,30,45 * * * *"
    - cron: "5,20,35,50 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore report archive
        uses: actions/cache@v4
        with:
          path: site/reports
          key: reports-${{ github.run_id }}
          restore-keys: |
            reports-

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Generate report
        env:
          POSITION_CONFIG_JSON: ${{ secrets.POSITION_CONFIG_JSON }}
          PREFERENCE_CONFIG_JSON: ${{ secrets.PREFERENCE_CONFIG_JSON }}
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET: ${{ secrets.OKX_API_SECRET }}
          OKX_API_PASSPHRASE: ${{ secrets.OKX_API_PASSPHRASE }}
        run: python -m btc_report.generate

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
